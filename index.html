<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Under Construction</title>
    <style>
        /* Base Reset & Body Styling */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
        }

        /* Container with Glassmorphism Effect */
        .container {
            padding: 50px 40px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            max-width: 500px;
            width: 90%;
            animation: fadeIn 1.2s ease-out;
        }

        /* Typography */
        h1 {
            font-size: 2.8rem;
            margin: 0 0 15px 0;
            letter-spacing: 1px;
        }

        p {
            font-size: 1.1rem;
            color: #d1d1d1;
            line-height: 1.6;
            margin-bottom: 35px;
        }

        /* YouTube Button Styling */
        .yt-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px 30px;
            background-color: #FF0000;
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(255, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .yt-btn:hover {
            background-color: #cc0000;
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(255, 0, 0, 0.5);
        }

        .yt-btn svg {
            width: 24px;
            height: 24px;
            margin-right: 10px;
            fill: currentColor;
        }

        /* Simple Fade-in Animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Under Construction 🚧</h1>
        <p>We are currently working hard behind the scenes to build something amazing. In the meantime, you can catch up
            with our latest content and tutorials over on YouTube!</p>

        <!-- YouTube Channel Link -->
        <a href="https://www.youtube.com/@Mr.Rhino3D" target="_blank" rel="noopener noreferrer" class="yt-btn">
            <!-- SVG YouTube Icon -->
            <svg viewBox="0 0 24 24">
                <path
                    d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z" />
            </svg>
            Visit Mr.Rhino3D
        </a>
    </div>

</body>

</html>
